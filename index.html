<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Түндүк — Идентификационная карта (Прототип)</title>
<style>
  :root{
    --bg:#272528;
    --surface:#141215;
    --surface-2:#2c2a2e;
    --text:#ffffff;
    --text-dim:#8b8c93;
    --text-dim-2:#5e5f66;
    --blue:#2f7df6;
    --teal:#22d6b5;
    --cyan:#3dbbec;
    --coral:#fd7577;
    --coral-text:#7c2420;
    --divider:#24252a;
    --safe-t: env(safe-area-inset-top, 0px);
    --safe-b: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--text);
    -webkit-font-smoothing:antialiased;
  }
  a{text-decoration:none;color:inherit;}
  button{font-family:inherit;border:none;background:none;color:inherit;cursor:pointer;padding:0;}
  ::-webkit-scrollbar{display:none;}

  /* Mobile-first: fluid full width, capped on wide desktop viewports (no fake phone chrome) */
  .app{
    position:relative;
    width:100%;
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    background:var(--bg);
    overflow:hidden;
  }

  /* ---------- Screens ---------- */
  .screen{
    position:absolute; inset:0;
    opacity:0; visibility:hidden;
    transition:opacity .25s ease;
    display:flex; flex-direction:column;
    min-height:100vh;
  }
  .screen.active{opacity:1; visibility:visible;}

  /* ---------- Splash ---------- */
  #screen-splash{
    align-items:center; justify-content:center;
    background:radial-gradient(circle at 50% 40%, #0f1320 0%, #07070a 70%);
    z-index:5;
  }
  #screen-splash img{width:84px;height:84px;animation:pulse 1.6s ease-in-out infinite;}
  #screen-splash .brand{margin-top:18px;font-size:13px;letter-spacing:.5px;color:var(--text-dim);font-weight:600;}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.08);opacity:.75;}}

  /* ---------- HOME ---------- */
  #screen-home{padding-top:var(--safe-t);}
  .home-scroll{flex:1;overflow-y:auto;padding-bottom:110px; padding: 5px;}
  .home-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 18px 10px;
  }
  .home-header .greet{display:flex;align-items:center;gap:4px;font-size:19px;font-weight:700;}
  .home-header .greet svg{opacity:.6;}
  .home-header .actions{display:flex;gap:10px;}
  .icon-btn{
    width:34px;height:34px;border-radius:50%;
    background:var(--blue);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }

  .banner-rail{
    display:flex; gap:10px; overflow-x:auto; padding:10px 18px 4px;
    scroll-snap-type:x proximity;
  }
  .banner{
    scroll-snap-align:start;
    flex:0 0 61%; aspect-ratio:1.86/1; border-radius:16px;
    position:relative; overflow:hidden;
    background:var(--surface-2);
  }
  .banner img{width:100%; height:100%; object-fit:cover; display:block;}

  .search-row{
    margin:14px 18px 0;
    height:46px; border-radius:14px;
    background:var(--surface);
    display:flex; align-items:center; gap:10px;
    padding:0 14px;
    width:calc(100% - 36px);
  }
  .search-row input{
    flex:1; background:none; border:none; outline:none;
    color:var(--text); font-size:15px;
  }
  .search-row input::placeholder{color:var(--text-dim);}

  .fine-banner{
    margin:14px 18px 0;
    background:var(--coral);
    border-radius:14px;
    display:flex; align-items:center; gap:10px;
    padding:13px 14px;
  }
  .fine-banner .shield{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.55);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .fine-banner .txt{flex:1; font-weight:700; font-size:14.5px; color:var(--coral-text);}
  .fine-banner svg.chev{opacity:.7;}

  .section-title{
    display:flex; align-items:center; justify-content:space-between;
    padding:24px 18px 10px;
  }
  .section-title h2{margin:0; font-size:18px; font-weight:700;}
  .help-dot{width:26px;height:26px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;color:var(--blue);font-size:13px;font-weight:700;}

  .docs-row{display:flex; gap:10px; padding:0 18px;}
  .doc-card{
    flex:1; aspect-ratio:1.86/1; border-radius:18px; position:relative; overflow:hidden;
    background:var(--surface-2);
  }
  .doc-card img{width:100%; height:100%; object-fit:cover; display:block;}

  .alldocs-link{
    display:flex; align-items:center; justify-content:center; gap:4px;
    margin:16px 18px 0; color:var(--blue); font-weight:600; font-size:14.5px;
  }

  .life-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 18px 10px;}
  .life-item{background:var(--surface); border-radius:16px; padding:14px;
  display: flex;
  flex-direction: column;
  justify-content: start;
  align-items: start;
  }
  .life-item .ic{width:32px; height:32px; line-height:1; margin-bottom:12px; display:block; border-radius:8px; overflow:hidden;}
  .life-item .ic img{width:100%; height:100%; object-fit:cover; display:block;}
  .life-item .ttl{color:var(--blue); font-weight:600; font-size:14px; line-height:1.25;  min-height:36px;}
  .life-item .cnt{color:var(--text); font-size:14px; font-weight: 700; }

  .bottom-nav{
    position:absolute; left:14px; right:14px;
    bottom:calc(14px + var(--safe-b));
    height:64px;
    border-radius:22px;
    background:rgba(19,20,26,.94);
    backdrop-filter:blur(14px);
    display:flex; align-items:center;
    box-shadow:0 14px 30px -8px rgba(47,125,246,.45), 0 6px 18px rgba(0,0,0,.55);
  }
  .nav-item{flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; color:var(--text-dim-2); font-size:10.5px; font-weight:600;}
  .nav-item.active{color:var(--blue);}

  /* ---------- CARD DETAIL SCREEN ---------- */
  #screen-card{padding-top:var(--safe-t);}
  .card-header{
    display:flex; align-items:center; gap:14px;
    padding:14px 18px 4px;
  }
  .back-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;}
  .card-header h1{font-size:20px; font-weight:700; margin:0;}

  .hint-dots{display:flex; justify-content:center; gap:5px; margin-top:26px;}
  .hint-dots i{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.16);}
  .hint-dots i:nth-child(2){background:rgba(255,255,255,.26);}
  .card-stack-wrap{margin-top:104px; padding:0 8%;  }
  .card-stack{position:relative; width:100%; aspect-ratio:494/495;}
  .stack-layer{
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; border-radius:18px;
    transition:transform .4s cubic-bezier(.25,.8,.3,1), box-shadow .4s ease, filter .4s ease;
    cursor:pointer;
    touch-action:none;
  }
  .stack-layer.is-front{
    transform:translateY(0) scale(1);
    box-shadow:0 24px 46px -18px rgba(0,0,0,.75);
    z-index:2;
  }
  .stack-layer.is-back{
    transform:translateY(-7%) scale(0.93);
    box-shadow:0 10px 22px -10px rgba(0,0,0,.5);
    filter:brightness(.82);
    z-index:1;
    pointer-events:none;
  }

  .dots{display:flex; justify-content:center; align-items:center; gap:6px; margin-top:18px;}
  .dot{width:7px;height:7px;border-radius:4px;background:#4a4b52; transition:all .25s ease;}
  .dot.active{width:20px; background:var(--teal);}

  /* QR sheet */
  .qr-sheet{
    position:absolute; left:0; right:0; bottom:0;
    background:var(--surface);
    border-radius:28px 28px 0 0;
    padding:46px 0 calc(14px + var(--safe-b));
    display:flex; flex-direction:column; align-items:center;
    touch-action:none;
  }
  .qr-fab{
    position:absolute; top:-46px; left:50%; transform:translateX(-50%);
    width:78px; height:78px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #4a93f9, #1c5fd6);
    display:flex; align-items:center; justify-content:center;
    border:9px solid var(--surface);
    overflow:hidden;
  }
  .qr-fab img{width:45px; height:45px; object-fit:cover; display:block;}
  .qr-fab .mini-qr{width:30px;height:46px;display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(5,1fr);gap:2px;}
  .qr-fab .mini-qr i{background:#fff;border-radius:1px;}
  .qr-caption{color:var(--text-dim); font-size:15.5px; font-weight:700; margin-top: 6px;  }

  /* QR modal */
  #qr-modal{
    position:fixed; inset:0; z-index:60;
    background:rgba(5,5,7,.7);
    display:flex; align-items:center; justify-content:center;
    opacity:0; visibility:hidden; transition:opacity .25s ease;
  }
  #qr-modal.open{opacity:1; visibility:visible;}
  .qr-panel{
    width:80%; max-width:300px; background:#fff; border-radius:24px; padding:26px 24px 22px;
    color:#10151c; text-align:center; position:relative;
    transform:translateY(16px); transition:transform .25s ease;
  }
  #qr-modal.open .qr-panel{transform:translateY(0);}
  .qr-panel .close-x{position:absolute; top:14px; right:14px; width:30px;height:30px;border-radius:50%;background:#f1f2f4;display:flex;align-items:center;justify-content:center;}
  .qr-panel h3{font-size:16px; margin:0 0 4px;}
  .qr-panel p.sub{font-size:12.5px; color:#6b7480; margin:0 0 18px;}
  .qr-panel img{width:100%; max-width:200px; height:auto; display:block;margin:0 auto;}
  .qr-panel .docnum{margin-top:16px; font-size:12px; color:#6b7480;}
  .qr-panel .docnum b{color:#10151c;}

  /* toast */
  #toast{
    position:fixed; left:50%; bottom:120px; transform:translateX(-50%) translateY(10px);
    background:#26272c; color:#fff; font-size:13.5px; font-weight:600;
    padding:11px 18px; border-radius:14px; white-space:nowrap;
    opacity:0; transition:all .25s ease; z-index:80; pointer-events:none;
    box-shadow:0 10px 24px -8px rgba(0,0,0,.6);
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
</style>
</head>

    <div class="dots">
      <button class="dot active" data-key="A" onclick="setFront('A')"></button>
      <button class="dot" data-key="B" onclick="setFront('B')"></button>
    </div>

    <div class="qr-sheet" id="qrSheet">
      <button class="qr-fab" id="qrFab" onclick="openQr()">
        <img src="./assets/qr-1.png" alt="">
      </button>
      <div class="qr-caption">Потяните для просмотра QR кода</div>
    </div>
  </div>

</div>

<div id="qr-modal" onclick="if(event.target===this) closeQr()">
  <div class="qr-panel">
    <button class="close-x" onclick="closeQr()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M5 5l14 14M19 5L5 19" stroke="#10151c" stroke-width="2.2" stroke-linecap="round"/></svg>
    </button>
    <h3>QR-код документа</h3>
    <p class="sub">Покажите этот код сотруднику для проверки</p>
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAATYAAAE2AQAAAADDx4MEAAACGklEQVR4nO2aQW7jMAxFH0cGulRu0KPYV5ub2UfpAQLYywFksAuKsVp0EaAYxVGkhSEnD7AJgfyfskS5Z+x/7sKgc7/j0PmYRbVht6rJ/4rp7HE0xNkqJGATkQnQmaA2U1XV+SniaIIbgH2AeLV7BRDiVex+mey3s8fRIjeueaLz9qYsl0rP7dzP3PKeELnsIlNMxfL87+d2rhiu4sm1IpZ67r91Pa/HbSIiMsBy2QXYReeYYLmAiJjGP0EcTXA5A2yswS7muW72V1V7flTiOApUdr5rUO9Jglqm9P6jJreJ6ExQE/DDVY0ryJRnTxBHE1xuw0dNMK5B88XrFMREr1f1OHSOKRetbHCD6kwuWnnW61UtztaDUROqK5YkLuoJy5S+HtU4vCz5ZVwx6ej7iY/giv1dwPXDUmMNuVHs+VGRG4+GA2zTJNcr3F899P1eizPF/qoVAC4iniRnj6MVzv0VQUvBALxJN7U/exytcKYfZq0onK83Id3v1uXw1jx3HbcGsPBXvV7V4/C2D0qru34xXr1eVePK/d1D2Y/9XReWs8fRDrdIHhD/SVYSdpGJXU7wfi/HFedL/Kv5+DGURvix7/dS3PfzJTJ+DEBMg4AADEmI17PH0Sa35y8hbG/eD2qin7+qx3H7AogvgKpv9x7y3vW8IhfUVRz0r4jArROZt6HnR0Xu+/ldKExvsZFy9jha4aSfbz8V9wkN+M1FOtRqdQAAAABJRU5ErkJggg==" alt="QR код">
    <div class="docnum">№ документа: <b>ID2977948</b></div>
  </div>
</div>

<div id="toast"></div>

<script>
  // ---- splash -> home (exactly 2s) ----
  window.addEventListener('load', () => {
    setTimeout(() => {
      document.getElementById('screen-splash').classList.remove('active');
      document.getElementById('screen-home').classList.add('active');
    }, 2000);
  });

  // ---- screen nav ----
  function openCard(){
    const splash = document.getElementById('screen-splash');
    document.getElementById('screen-home').classList.remove('active');
    splash.classList.add('active');
    setTimeout(()=>{
      splash.classList.remove('active');
      document.getElementById('screen-card').classList.add('active');
    }, 2000);
  }
  function closeCard(){
    document.getElementById('screen-card').classList.remove('active');
    document.getElementById('screen-home').classList.add('active');
    closeQr();
  }

  // ---- card stack (front/back like a stacked-notification flip) ----
  const layerA = document.getElementById('layerA'); // front.jpg
  const layerB = document.getElementById('layerB'); // back.jpg
  const stackDots = document.querySelectorAll('.dot');
  let frontKey = 'A';

  function applyStack(){
    const aFront = frontKey === 'A';
    layerA.classList.toggle('is-front', aFront);
    layerA.classList.toggle('is-back', !aFront);
    layerB.classList.toggle('is-front', !aFront);
    layerB.classList.toggle('is-back', aFront);
    stackDots.forEach(d => d.classList.toggle('active', d.dataset.key === frontKey));
  }
  function setFront(key){
    if(frontKey === key) return;
    frontKey = key;
    applyStack();
  }
  function flipStack(){ setFront(frontKey === 'A' ? 'B' : 'A'); }

  const stack = document.getElementById('cardStack');
  let stackStartY = 0, stackStartX = 0, stackMoved = false;
  stack.addEventListener('pointerdown', (e)=>{ stackStartY = e.clientY; stackStartX = e.clientX; stackMoved = false; });
  stack.addEventListener('pointermove', (e)=>{
    if(Math.abs(e.clientY - stackStartY) > 8 || Math.abs(e.clientX - stackStartX) > 8) stackMoved = true;
  });
  stack.addEventListener('pointerup', (e)=>{
    const dy = e.clientY - stackStartY;
    if(!stackMoved || dy < -25) flipStack(); // tap, or swipe-up like dismissing a notification
  });

  // ---- QR sheet drag-up + modal ----
  const qrSheet = document.getElementById('qrSheet');
  let sheetStartY = 0, sheetDragging = false;
  qrSheet.addEventListener('pointerdown', (e)=>{ sheetStartY = e.clientY; sheetDragging = true; });
  qrSheet.addEventListener('pointermove', (e)=>{
    if(!sheetDragging) return;
    if(sheetStartY - e.clientY > 35){ sheetDragging = false; openQr(); }
  });
  qrSheet.addEventListener('pointerup', ()=> sheetDragging = false);

  function openQr(){ document.getElementById('qr-modal').classList.add('open'); }
  function closeQr(){ document.getElementById('qr-modal').classList.remove('open'); }
  document.addEventListener('keydown', (e)=>{ if(e.key === 'Escape') closeQr(); });

  // ---- toast ----
  let toastTimer;
  function toast(msg){
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=> el.classList.remove('show'), 1800);
  }
</script>
</body>
</html>
